name: Build FocusGuard

on:
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: 'Upload to TestFlight'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.2'
    
    - name: Install xcodegen
      run: brew install xcodegen
    
    - name: Generate Project
      run: |
        rm -f Package.swift project.yml
        echo 'name: FocusGuard' > project.yml
        echo 'targets:' >> project.yml
        echo '  FocusGuard:' >> project.yml
        echo '    type: application' >> project.yml
        echo '    platform: iOS' >> project.yml
        echo '    deploymentTarget: "16.0"' >> project.yml
        echo '    sources:' >> project.yml
        echo '      - path: .' >> project.yml
        echo '    settings:' >> project.yml
        echo '      base:' >> project.yml
        echo '        PRODUCT_BUNDLE_IDENTIFIER: com.baobao.focusguard' >> project.yml
        echo '        SWIFT_VERSION: "5.9"' >> project.yml
        cat project.yml
        xcodegen generate --project .
    
    - name: Build
      run: |
        xcodebuild -project FocusGuard.xcodeproj -scheme FocusGuard -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.2' -configuration Debug build CODE_SIGNING_REQUIRED=NO CODE_SIGNING_ALLOWED=NO 2>&1 | tee build.log | tail -200
        exit_code=${PIPESTATUS[0]}
        echo "Exit code: $exit_code"
        if [ $exit_code -ne 0 ]; then
          echo "=== Build failed, showing errors ==="
          grep -i "error:" build.log | head -50
          exit $exit_code
        fi
      continue-on-error: true
