name: Build FocusGuard iOS App

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: '上传到 TestFlight'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.2'
    
    - name: Show Xcode Version
      run: xcodebuild -version
    
    - name: Show Available Simulators
      run: xcrun simctl list devices
    
    # 编译项目（模拟器）
    - name: Build for Simulator
      run: |
        xcodebuild -project FocusGuard.xcodeproj \
                   -scheme FocusGuard \
                   -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.2' \
                   -configuration Debug \
                   build \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGNING_ALLOWED=NO
    
    # 运行单元测试
    - name: Run Tests
      run: |
        xcodebuild test -project FocusGuard.xcodeproj \
                        -scheme FocusGuard \
                        -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.2' \
                        -configuration Debug \
                        CODE_SIGNING_REQUIRED=NO \
                        CODE_SIGNING_ALLOWED=NO
      continue-on-error: true
    
    # 上传构建产物
    - name: Upload Build Log
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: |
          ~/Library/Developer/Xcode/DerivedData/**/Logs/**

  build-and-upload:
    name: Build and Upload to App Store
    runs-on: macos-14
    if: github.event.inputs.upload_to_testflight == 'true'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.2'
    
    # 安装证书
    - name: Install Apple Certificate
      uses: apple-actions/import-codesign-certs@v2
      with:
        p12-file-base64: ${{ secrets.CERTIFICATES_P12 }}
        p12-password: ${{ secrets.CERTIFICATES_PASSWORD }}
    
    # 安装描述文件
    - name: Install Provisioning Profile
      uses: apple-actions/download-provisioning-profiles@v1
      with:
        bundle-id: com.baobao.focusguard
        issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
        api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
        api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
    
    # 构建并归档
    - name: Build Archive
      run: |
        xcodebuild -project FocusGuard.xcodeproj \
                   -scheme FocusGuard \
                   -archivePath $RUNNER_TEMP/FocusGuard.xcarchive \
                   -destination 'generic/platform=iOS' \
                   archive
    
    # 导出 IPA
    - name: Export IPA
      run: |
        xcodebuild -exportArchive \
                   -archivePath $RUNNER_TEMP/FocusGuard.xcarchive \
                   -exportPath $RUNNER_TEMP/build \
                   -exportOptionsPlist ExportOptions.plist
    
    # 上传到 TestFlight
    - name: Upload to TestFlight
      uses: apple-actions/upload-testflight-build@v1
      with:
        app-path: $RUNNER_TEMP/build/FocusGuard.ipa
        issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
        api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
        api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
    
    # 上传 IPA 作为产物
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: FocusGuard-IPA
        path: $RUNNER_TEMP/build/FocusGuard.ipa