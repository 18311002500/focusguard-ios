name: Build
on: workflow_dispatch
jobs:
  build:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4
    - run: brew install xcodegen
    - run: xcodegen generate
    - run: xcodebuild -project FocusGuard.xcodeproj -scheme FocusGuard -destination 'platform=iOS' -archivePath app.xcarchive archive
