name: Build
on: workflow_dispatch
jobs:
  build:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4
    - name: Build
      run: |
        xcodebuild -project FocusGuard.xcodeproj \
                   -scheme FocusGuard \
                   -destination 'generic/platform=iOS' \
                   -archivePath app.xcarchive \
                   archive \
                   CODE_SIGNING_REQUIRED=NO
