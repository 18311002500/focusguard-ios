name: Build FocusGuard iOS App

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: '上传到 TestFlight'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.2'
    
    - name: Install xcodegen
      run: |
        brew install xcodegen
    
    - name: Generate Xcode Project
      run: |
        xcodegen generate
        ls -la *.xcodeproj
        echo ""
        echo "=== Project Structure ==="
        find . -name "*.swift" | head -20
        echo ""
        echo "=== Checking entitlements ==="
        cat FocusGuard.entitlements || echo "No entitlements file"
    
    - name: Show Xcode Version
      run: xcodebuild -version
    
    - name: Show Available Simulators
      run: xcrun simctl list devices
    
    # 编译项目（模拟器）
    - name: Build for Simulator
      run: |
        # 首先检查项目文件
        echo "=== Checking project files ==="
        ls -la *.xcodeproj 2>/dev/null || echo "No xcodeproj found"
        ls -la *.swift | head -10
        
        # 列出可用的 scheme
        echo ""
        echo "=== Available Schemes ==="
        xcodebuild -project FocusGuard.xcodeproj -list 2>&1 | head -50
        
        # 尝试构建，捕获所有输出
        echo ""
        echo "=== Starting Build ==="
        set -o pipefail
        xcodebuild -project FocusGuard.xcodeproj \
                   -scheme FocusGuard \
                   -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.2' \
                   -configuration Debug \
                   build \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGNING_ALLOWED=NO \
                   2>&1 | tee build.log | head -500
        
        exit_code=${PIPESTATUS[0]}
        echo ""
        echo "=== Exit code: $exit_code ==="
        exit $exit_code
      continue-on-error: true
    
    # 显示构建日志
    - name: Show Build Log
      if: always()
      run: |
        echo "=== Build Log (first 200 lines) ==="
        head -200 build.log
        
        echo ""
        echo "=== Build Log (last 200 lines) ==="
        tail -200 build.log
        
        echo ""
        echo "=== Looking for errors ==="
        grep -i "error:\|warning:\|fatal:" build.log | head -50 || echo "No errors found in log"
        
        echo ""
        echo "=== Check if xcodeproj exists ==="
        ls -la *.xcodeproj 2>/dev/null || echo "No xcodeproj found"
        
        echo ""
        echo "=== Check project structure ==="
        ls -la
    
    # 运行单元测试
    - name: Run Tests
      run: |
        xcodebuild test -project FocusGuard.xcodeproj \
                        -scheme FocusGuard \
                        -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.2' \
                        -configuration Debug \
                        CODE_SIGNING_REQUIRED=NO \
                        CODE_SIGNING_ALLOWED=NO
      continue-on-error: true

  build-and-upload:
    name: Build and Upload to App Store
    runs-on: macos-14
    if: github.event.inputs.upload_to_testflight == 'true'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.2'
    
    - name: Install xcodegen
      run: |
        brew install xcodegen
    
    - name: Generate Xcode Project
      run: |
        xcodegen generate
    
    # 安装证书
    - name: Install Apple Certificate
      uses: apple-actions/import-codesign-certs@v2
      with:
        p12-file-base64: ${{ secrets.CERTIFICATES_P12 }}
        p12-password: ${{ secrets.CERTIFICATES_PASSWORD }}
    
    # 安装描述文件
    - name: Install Provisioning Profile
      run: |
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/FocusGuard_App_Store.mobileprovision
    
    # 构建并归档
    - name: Build Archive
      run: |
        xcodebuild -project FocusGuard.xcodeproj \
                   -scheme FocusGuard \
                   -archivePath $RUNNER_TEMP/FocusGuard.xcarchive \
                   -destination 'generic/platform=iOS' \
                   archive \
                   CODE_SIGN_IDENTITY="iPhone Distribution" \
                   PROVISIONING_PROFILE_SPECIFIER="FocusGuard App Store"
    
    # 导出 IPA
    - name: Export IPA
      run: |
        cat > ExportOptions.plist << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>54LA8Y9L27</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
                <key>com.baobao.focusguard</key>
                <string>FocusGuard App Store</string>
            </dict>
        </dict>
        </plist>
        EOF
        
        xcodebuild -exportArchive \
                   -archivePath $RUNNER_TEMP/FocusGuard.xcarchive \
                   -exportPath $RUNNER_TEMP/build \
                   -exportOptionsPlist ExportOptions.plist
    
    # 上传到 TestFlight
    - name: Upload to TestFlight
      uses: apple-actions/upload-testflight-build@v1
      with:
        app-path: $RUNNER_TEMP/build/FocusGuard.ipa
        issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
        api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
        api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
    
    # 上传 IPA 作为产物
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: FocusGuard-IPA
        path: $RUNNER_TEMP/build/FocusGuard.ipa
