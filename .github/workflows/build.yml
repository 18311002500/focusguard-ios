name: Build and Upload FocusGuard

on:
  workflow_dispatch:

jobs:
  build-and-upload:
    runs-on: macos-14
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.2'
    
    - name: Install xcodegen
      run: brew install xcodegen
    
    - name: Generate Project
      run: |
        rm -f Package.swift project.yml
        cat > project.yml << 'EOF'
name: FocusGuard
targets:
  FocusGuard:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: .
        excludes:
          - .git
          - .github
          - certificates
          - "*.md"
          - "*.sh"
          - "*.py"
          - "*.yml"
          - "project.yml"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.baobao.focusguard
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MACCATALYST: NO
EOF
        xcodegen generate --project .
    
    - name: Install Certificate
      uses: apple-actions/import-codesign-certs@v2
      with:
        p12-file-base64: ${{ secrets.CERTIFICATES_P12 }}
        p12-password: ${{ secrets.CERTIFICATES_PASSWORD }}
    
    - name: Install Profile
      run: |
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/profile.mobileprovision
    
    - name: Build Archive
      run: |
        xcodebuild -project FocusGuard.xcodeproj \
                   -scheme FocusGuard \
                   -archivePath $RUNNER_TEMP/app.xcarchive \
                   -destination 'generic/platform=iOS' \
                   archive \
                   CODE_SIGN_IDENTITY="iPhone Distribution" \
                   PROVISIONING_PROFILE_SPECIFIER="FocusGuard App Store" \
                   CODE_SIGN_STYLE=Manual \
                   DEVELOPMENT_TEAM=54LA8Y9L27
    
    - name: Export IPA
      run: |
        cat > options.plist << 'EOF'
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>54LA8Y9L27</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
                <key>com.baobao.focusguard</key>
                <string>FocusGuard App Store</string>
            </dict>
        </dict>
        </plist>
        EOF
        xcodebuild -exportArchive \
                   -archivePath $RUNNER_TEMP/app.xcarchive \
                   -exportPath $RUNNER_TEMP/build \
                   -exportOptionsPlist options.plist
    
    - name: Upload to TestFlight
      uses: apple-actions/upload-testflight-build@v1
      with:
        app-path: $RUNNER_TEMP/build/FocusGuard.ipa
        issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
        api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
        api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
