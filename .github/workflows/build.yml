name: Build FocusGuard iOS App

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      upload_to_testflight:
        description: '上传到 TestFlight'
        required: false
        default: 'false'
        type: choice
        options:
          - 'true'
          - 'false'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build iOS App
    runs-on: macos-14
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.2'
    
    - name: Debug Environment
      run: |
        echo "=== Current directory ==="
        pwd
        ls -la
        
        echo ""
        echo "=== Check for problematic files ==="
        find . -name "*.yml" -o -name "*.yaml" | grep -v ".github"
        
        echo ""
        echo "=== Check Swift files ==="
        ls -la *.swift 2>/dev/null | head -5 || echo "No swift files in root"
        
        echo ""
        echo "=== Check for Package.swift ==="
        ls -la Package.swift 2>/dev/null || echo "No Package.swift"
    
    - name: Install xcodegen
      run: |
        brew install xcodegen
        which xcodegen
        xcodegen version
    
    - name: Remove problematic files and generate project
      run: |
        # Remove any potentially problematic files
        rm -f Package.swift
        rm -f project.yml
        
        # Create a minimal project.yml
        cat > project.yml << 'YAMLEOF'
name: FocusGuard
targets:
  FocusGuard:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: .
        excludes:
          - .git
          - .github
          - certificates
          - "*.md"
          - "*.sh"
          - "*.py"
          - "*.yml"
          - "project.yml"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.baobao.focusguard
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MACCATALYST: NO
YAMLEOF
        
        echo "=== Generated project.yml ==="
        cat project.yml
        
        echo ""
        echo "=== Running xcodegen ==="
        xcodegen generate --project . 2>&1
        
        echo ""
        echo "=== Check result ==="
        if [ -d "FocusGuard.xcodeproj" ]; then
          echo "SUCCESS: Project generated"
          ls -la FocusGuard.xcodeproj/
        else
          echo "FAILED: No project generated"
          exit 1
        fi
    
    - name: Build Project
      run: |
        xcodebuild -project FocusGuard.xcodeproj \
                   -scheme FocusGuard \
                   -destination 'platform=iOS Simulator,name=iPhone 15,OS=17.2' \
                   -configuration Debug \
                   build \
                   CODE_SIGNING_REQUIRED=NO \
                   CODE_SIGNING_ALLOWED=NO 2>&1 | head -500
      continue-on-error: true

  build-and-upload:
    name: Build and Upload to App Store
    runs-on: macos-14
    if: github.event.inputs.upload_to_testflight == 'true'
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
      
    - name: Setup Xcode
      uses: maxim-lobanov/setup-xcode@v1
      with:
        xcode-version: '15.2'
    
    - name: Generate Xcode Project
      run: |
        rm -f Package.swift project.yml
        brew install xcodegen
        cat > project.yml << 'YAMLEOF'
name: FocusGuard
targets:
  FocusGuard:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: .
        excludes:
          - .git
          - .github
          - certificates
          - "*.md"
          - "*.sh"
          - "*.py"
          - "*.yml"
          - "project.yml"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.baobao.focusguard
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MACCATALYST: NO
YAMLEOF
        xcodegen generate --project .
    
    # 安装证书
    - name: Install Apple Certificate
      uses: apple-actions/import-codesign-certs@v2
      with:
        p12-file-base64: ${{ secrets.CERTIFICATES_P12 }}
        p12-password: ${{ secrets.CERTIFICATES_PASSWORD }}
    
    # 安装描述文件
    - name: Install Provisioning Profile
      run: |
        mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
        echo "${{ secrets.PROVISIONING_PROFILE }}" | base64 --decode > ~/Library/MobileDevice/Provisioning\ Profiles/FocusGuard_App_Store.mobileprovision
    
    # 构建并归档
    - name: Build Archive
      run: |
        xcodebuild -project FocusGuard.xcodeproj \
                   -scheme FocusGuard \
                   -archivePath $RUNNER_TEMP/FocusGuard.xcarchive \
                   -destination 'generic/platform=iOS' \
                   archive \
                   CODE_SIGN_IDENTITY="iPhone Distribution" \
                   PROVISIONING_PROFILE_SPECIFIER="FocusGuard App Store"
    
    # 导出 IPA
    - name: Export IPA
      run: |
        cat > ExportOptions.plist << EOF
        <?xml version="1.0" encoding="UTF-8"?>
        <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
        <plist version="1.0">
        <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>54LA8Y9L27</string>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
                <key>com.baobao.focusguard</key>
                <string>FocusGuard App Store</string>
            </dict>
        </dict>
        </plist>
        EOF
        
        xcodebuild -exportArchive \
                   -archivePath $RUNNER_TEMP/FocusGuard.xcarchive \
                   -exportPath $RUNNER_TEMP/build \
                   -exportOptionsPlist ExportOptions.plist
    
    # 上传到 TestFlight
    - name: Upload to TestFlight
      uses: apple-actions/upload-testflight-build@v1
      with:
        app-path: $RUNNER_TEMP/build/FocusGuard.ipa
        issuer-id: ${{ secrets.APPSTORE_ISSUER_ID }}
        api-key-id: ${{ secrets.APPSTORE_API_KEY_ID }}
        api-private-key: ${{ secrets.APPSTORE_API_PRIVATE_KEY }}
    
    # 上传 IPA 作为产物
    - name: Upload IPA
      uses: actions/upload-artifact@v4
      with:
        name: FocusGuard-IPA
        path: $RUNNER_TEMP/build/FocusGuard.ipa
