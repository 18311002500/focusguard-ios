name: Complete Certificate Generation (Part 2)

on:
  workflow_dispatch:
    inputs:
      cert_password:
        description: 'P12 证书密码（设置后请牢记）'
        required: true
        default: 'focusguard123'
        type: string

jobs:
  generate-p12:
    name: Generate P12 from CER Files
    runs-on: macos-14
    
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    
    - name: Check for CER files
      run: |
        if [ ! -f "certificates/ios_development.cer" ] || [ ! -f "certificates/ios_distribution.cer" ]; then
          echo "错误：缺少 CER 文件"
          echo "请先运行 'Generate iOS Certificates' workflow 生成 CSR"
          echo "然后在 Apple Developer 网站下载 .cer 文件并上传到此仓库的 certificates/ 目录"
          exit 1
        fi
    
    - name: Generate P12
      run: |
        mkdir -p certificates/output
        
        # 将 CER 转换为 PEM
        openssl x509 -in certificates/ios_development.cer -inform DER -out certificates/ios_development.pem
        openssl x509 -in certificates/ios_distribution.cer -inform DER -out certificates/ios_distribution.pem
        
        # 读取私钥
        PRIVATE_KEY=$(cat certificates/private.key)
        
        # 生成开发证书 P12
        echo "$PRIVATE_KEY" > certificates/temp.key
        openssl pkcs12 -export \
          -in certificates/ios_development.pem \
          -inkey certificates/temp.key \
          -out certificates/output/ios_development.p12 \
          -name "iOS Development" \
          -passout pass:${{ github.event.inputs.cert_password }}
        
        # 生成分发证书 P12
        openssl pkcs12 -export \
          -in certificates/ios_distribution.pem \
          -inkey certificates/temp.key \
          -out certificates/output/ios_distribution.p12 \
          -name "iOS Distribution" \
          -passout pass:${{ github.event.inputs.cert_password }}
        
        # 合并为一个 P12（用于 GitHub Actions）
        openssl pkcs12 -export \
          -in certificates/ios_development.pem \
          -in certificates/ios_distribution.pem \
          -inkey certificates/temp.key \
          -out certificates/output/Certificates.p12 \
          -name "FocusGuard Certificates" \
          -passout pass:${{ github.event.inputs.cert_password }}
        
        # 清理临时文件
        rm certificates/temp.key
        
        echo "P12 文件生成完成！"
    
    - name: Upload P12 Files
      uses: actions/upload-artifact@v4
      with:
        name: p12-certificates
        path: certificates/output/*.p12
        retention-days: 7
    
    - name: Display GitHub Secrets
      run: |
        echo "=========================================="
        echo "P12 文件已生成！"
        echo "=========================================="
        echo ""
        echo "请将以下内容添加到 GitHub Secrets："
        echo ""
        echo "1. CERTIFICATES_P12:"
        echo "   （以下 Base64 编码）"
        echo ""
        base64 certificates/output/Certificates.p12
        echo ""
        echo ""
        echo "2. CERTIFICATES_PASSWORD:"
        echo "   ${{ github.event.inputs.cert_password }}"
        echo ""
        echo "=========================================="
        echo ""
        echo "下一步：创建描述文件"
        echo "访问 https://developer.apple.com/account/resources/profiles/list"
        echo "点击 '+' → App Store → 选择 FocusGuard App ID → 选择证书 → 下载"
