name: FocusGuard
targets:
  FocusGuard:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: .
        excludes:
          - .git
          - .github
          - certificates
          - "*.md"
          - "*.sh"
          - "*.py"
          - "*.yml"
          - "project.yml"
          - "Package.swift"
          - "temp_certs"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.baobao.focusguard
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SUPPORTS_MACCATALYST: NO
        SWIFT_STRICT_CONCURRENCY: minimal
        SWIFT_TREAT_WARNINGS_AS_ERRORS: NO
