name: FocusGuard
targets:
  FocusGuard:
    type: application
    platform: iOS
    deploymentTarget: "16.0"
    sources:
      - path: .
        excludes:
          - .git
          - .github
          - certificates
          - "*.md"
          - "*.sh"
          - "*.py"
          - "*.yml"
          - "*.yaml"
          - "*.plist"
          - "*.entitlements"
          - "project.yml"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.baobao.focusguard
        INFOPLIST_FILE: Info.plist
        CODE_SIGN_ENTITLEMENTS: FocusGuard.entitlements
        SWIFT_VERSION: "5.9"
        TARGETED_DEVICE_FAMILY: "1"
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        SUPPORTS_MACCATALYST: NO
        SUPPORTS_MAC_DESIGNED_FOR_IPHONE_IPAD: NO
    info:
      path: Info.plist
      properties:
        CFBundleDisplayName: FocusGuard
        CFBundleShortVersionString: "1.0.0"
        CFBundleVersion: "1"
        LSRequiresIPhoneOS: YES
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UIApplicationSupportsIndirectInputEvents: YES
        NSFamilyControlsUsageDescription: "FocusGuard 需要访问您的屏幕使用时间数据，以帮您追踪应用使用情况和设置专注模式。"
    entitlements:
      path: FocusGuard.entitlements
      properties:
        com.apple.developer.family-controls: true
        com.apple.security.application-groups:
          - group.com.baobao.focusguard
