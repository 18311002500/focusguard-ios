workflows:
  ios-build:
    name: Build FocusGuard iOS
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      vars:
        BUNDLE_ID: com.baobao.focusguard
        XCODE_VERSION: "15.4"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.baobao.focusguard
    scripts:
      - name: Install dependencies
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          xcodegen generate
      - name: Install dependencies
        script: |
          pod install || echo "No Podfile found"
      - name: Build archive
        script: |
          xcodebuild -project FocusGuard.xcodeproj \
                     -scheme FocusGuard \
                     -sdk iphoneos \
                     -configuration Release \
                     -archivePath build/FocusGuard.xcarchive \
                     CODE_SIGN_STYLE=Manual \
                     PROVISIONING_PROFILE_SPECIFIER="" \
                     archive
      - name: Export IPA
        script: |
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>$(echo $CM_TEAM_ID)</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.baobao.focusguard</key>
              <string>FocusGuard App Store</string>
            </dict>
          </dict>
          </plist>
          EOF
          
          xcodebuild -exportArchive \
                     -archivePath build/FocusGuard.xcarchive \
                     -exportPath build/ \
                     -exportOptionsPlist ExportOptions.plist
    artifacts:
      - build/*.ipa
    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_KEY
        key_id: $APP_STORE_CONNECT_KEY_ID
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
