workflows:
  ios-build:
    name: Build FocusGuard iOS
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      vars:
        BUNDLE_ID: com.baobao.focusguard
        XCODE_VERSION: "15.4"
    scripts:
      - name: Install dependencies
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          xcodegen generate
      - name: Set up code signing
        script: |
          # 创建 keychain
          security create-keychain -p "codemagic" build.keychain
          security default-keychain -s build.keychain
          security unlock-keychain -p "codemagic" build.keychain
          
          # 导入证书
          echo "$CM_CERTIFICATE" | base64 --decode > certificate.p12
          security import certificate.p12 -k build.keychain -P "$CM_CERTIFICATE_PASSWORD" -T /usr/bin/codesign
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "codemagic" build.keychain
          
          # 安装描述文件
          echo "$CM_PROVISIONING_PROFILE" | base64 --decode > profile.mobileprovision
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          UUID=$(grep -a -A1 "UUID" profile.mobileprovision | grep string | sed -n 's/.*<string>\(.*\)<\/string>.*/\1/p')
          cp profile.mobileprovision ~/Library/MobileDevice/Provisioning\ Profiles/$UUID.mobileprovision
      - name: Build archive
        script: |
          xcodebuild -project FocusGuard.xcodeproj \
                     -scheme FocusGuard \
                     -sdk iphoneos \
                     -configuration Release \
                     -archivePath build/FocusGuard.xcarchive \
                     CODE_SIGN_STYLE=Manual \
                     CODE_SIGN_IDENTITY="Apple Distribution" \
                     PROVISIONING_PROFILE_SPECIFIER="" \
                     archive
      - name: Export IPA
        script: |
          cat > ExportOptions.plist << 'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>$(security find-identity -v -p codesigning build.keychain | grep "Apple Distribution" | head -1 | sed 's/.*(\([A-Z0-9]*\)).*/\1/')</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.baobao.focusguard</key>
              <string>FocusGuard App Store</string>
            </dict>
            <key>signingStyle</key>
            <string>manual</string>
          </dict>
          </plist>
          EOF
          
          xcodebuild -exportArchive \
                     -archivePath build/FocusGuard.xcarchive \
                     -exportPath build/ \
                     -exportOptionsPlist ExportOptions.plist
    artifacts:
      - build/*.ipa
    publishing:
      app_store_connect:
        api_key: $APPSTORE_ISSUER_ID
        key_id: $APPSTORE_API_KEY_ID
        issuer_id: $APPSTORE_ISSUER_ID
        submit_to_testflight: true
