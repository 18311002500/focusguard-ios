workflows:
  ios-build:
    name: Build FocusGuard iOS
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      vars:
        BUNDLE_ID: com.baobao.focusguard
        XCODE_VERSION: "15.4"
    scripts:
      - name: Install dependencies
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          xcodegen generate
      - name: Setup signing
        script: |
          echo "Setting up signing..."
          
          # 创建证书目录
          mkdir -p ~/Library/MobileDevice/Provisioning\ Profiles
          
          # 检查环境变量
          echo "CM_CERTIFICATE set: $([ -n \"$CM_CERTIFICATE\" ] && echo 'YES' || echo 'NO')"
          echo "CM_CERTIFICATE_PASSWORD set: $([ -n \"$CM_CERTIFICATE_PASSWORD\" ] && echo 'YES' || echo 'NO')"
          echo "CM_PROVISIONING_PROFILE set: $([ -n \"$CM_PROVISIONING_PROFILE\" ] && echo 'YES' || echo 'NO')"
          
          # 解码证书
          if [ -n "$CM_CERTIFICATE" ]; then
            echo "Decoding certificate..."
            echo "$CM_CERTIFICATE" | base64 -d > /tmp/Certificates.p12
            
            # 创建临时钥匙串
            security create-keychain -p "temp123" build.keychain
            security default-keychain -s build.keychain
            security unlock-keychain -p "temp123" build.keychain
            security set-keychain-settings -t 3600 -u build.keychain
            
            # 导入证书
            security import /tmp/Certificates.p12 -k build.keychain -P "$CM_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12
            security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "temp123" build.keychain
            
            echo "Certificate imported"
          else
            echo "WARNING: CM_CERTIFICATE not set"
          fi
          
          # 解码描述文件
          if [ -n "$CM_PROVISIONING_PROFILE" ]; then
            echo "Decoding provisioning profile..."
            echo "$CM_PROVISIONING_PROFILE" | base64 -d > ~/Library/MobileDevice/Provisioning\ Profiles/FocusGuard.mobileprovision
            echo "Provisioning profile saved"
            ls -la ~/Library/MobileDevice/Provisioning\ Profiles/
          else
            echo "WARNING: CM_PROVISIONING_PROFILE not set"
          fi
          
          # 列出可用证书
          echo "Available certificates:"
          security find-identity -v -p codesigning
          
          # 提取 Team ID
          TEAM_ID=$(security find-identity -v -p codesigning 2>/dev/null | grep "Apple Distribution" | head -1 | sed -n 's/.*(\([A-Z0-9]*\)).*/\1/p')
          echo "Extracted Team ID: $TEAM_ID"
          echo "TEAM_ID=$TEAM_ID" >> $CM_ENV
      - name: Build archive
        script: |
          # 读取 Team ID
          source $CM_ENV
          echo "Using Team ID: $TEAM_ID"
          
          # 获取证书名称
          CERT_NAME=$(security find-identity -v -p codesigning 2>/dev/null | grep "Apple Distribution" | head -1 | sed -n 's/.*"\([^"]*\)".*/\1/p')
          echo "Certificate name: $CERT_NAME"
          
          if [ -z "$TEAM_ID" ]; then
            echo "ERROR: Team ID is empty. Certificate may not be imported correctly."
            exit 1
          fi
          
          xcodebuild -project FocusGuard.xcodeproj \
                     -scheme FocusGuard \
                     -sdk iphoneos \
                     -configuration Release \
                     -archivePath build/FocusGuard.xcarchive \
                     CODE_SIGN_STYLE=Manual \
                     CODE_SIGN_IDENTITY="$CERT_NAME" \
                     PROVISIONING_PROFILE_SPECIFIER="" \
                     DEVELOPMENT_TEAM="$TEAM_ID" \
                     SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
                     archive 2>&1 | tee build.log
      - name: Check build log
        script: |
          if grep -q "error:" build.log; then
            echo "Build failed with errors:"
            grep -A 5 "error:" build.log | head -50
            exit 1
          fi
          echo "Build succeeded!"
      - name: Create ExportOptions.plist
        script: |
          source $CM_ENV
          echo "Creating ExportOptions.plist with Team ID: $TEAM_ID"
          
          cat > ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store-connect</string>
            <key>teamID</key>
            <string>${TEAM_ID}</string>
            <key>uploadSymbols</key>
            <true/>
            <key>uploadBitcode</key>
            <false/>
            <key>signingStyle</key>
            <string>manual</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>com.baobao.focusguard</key>
              <string>FocusGuard App Store</string>
            </dict>
          </dict>
          </plist>
          EOF
          
          cat ExportOptions.plist
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
                     -archivePath build/FocusGuard.xcarchive \
                     -exportPath build/ \
                     -exportOptionsPlist ExportOptions.plist
    artifacts:
      - build/*.ipa
      - build.log
