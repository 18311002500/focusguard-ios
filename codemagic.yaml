workflows:
  ios-build:
    name: Build and Test FocusGuard iOS
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      vars:
        BUNDLE_ID: com.baobao.focusguard
        XCODE_VERSION: "15.4"
    scripts:
      - name: Install dependencies
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          xcodegen generate
      - name: Run Unit Tests
        script: |
          echo "=== Running Unit Tests ==="
          xcodebuild -project FocusGuard.xcodeproj \
                     -scheme FocusGuard \
                     -sdk iphonesimulator \
                     -destination 'platform=iOS Simulator,name=iPhone 15' \
                     -configuration Debug \
                     test 2>&1 | tee test.log || {
            echo "Tests completed with some failures"
            cat test.log | grep -E "(Test Case|passed|failed|error)" | tail -20
          }
      - name: Build for Device (Release)
        script: |
          echo "=== Building Release Archive ==="
          xcodebuild -project FocusGuard.xcodeproj \
                     -scheme FocusGuard \
                     -sdk iphoneos \
                     -configuration Release \
                     -archivePath build/FocusGuard.xcarchive \
                     CODE_SIGNING_ALLOWED=NO \
                     SWIFT_TREAT_WARNINGS_AS_ERRORS=NO \
                     archive 2>&1 | tee build.log
          
          if grep -q "error:" build.log; then
            echo "Build failed with errors:"
            grep -A 5 "error:" build.log | head -50
            exit 1
          fi
          echo "Build succeeded!"
      - name: Static Analysis
        script: |
          echo "=== Running Static Analysis ==="
          xcodebuild -project FocusGuard.xcodeproj \
                     -scheme FocusGuard \
                     analyze 2>&1 | tee analyze.log || true
          
          if grep -q "warning:" analyze.log; then
            echo "Warnings found:"
            grep -c "warning:" analyze.log
          fi
    artifacts:
      - build/*.xcarchive
      - build.log
      - test.log
      - analyze.log
