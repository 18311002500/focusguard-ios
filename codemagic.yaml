workflows:
  ios-build:
    name: Build FocusGuard iOS
    instance_type: mac_mini_m1
    max_build_duration: 60
    environment:
      vars:
        BUNDLE_ID: com.baobao.focusguard
        XCODE_VERSION: "15.4"
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.baobao.focusguard
    scripts:
      - name: Install dependencies
        script: |
          brew install xcodegen
      - name: Generate Xcode project
        script: |
          xcodegen generate
      - name: Build archive
        script: |
          # 从钥匙串获取 Team ID
          TEAM_ID=$(security find-identity -v -p codesigning | grep "Apple Distribution" | head -1 | sed 's/.*(\([A-Z0-9]*\)).*/\1/')
          echo "Using Team ID: $TEAM_ID"
          
          xcodebuild -project FocusGuard.xcodeproj \
                     -scheme FocusGuard \
                     -sdk iphoneos \
                     -configuration Release \
                     -archivePath build/FocusGuard.xcarchive \
                     DEVELOPMENT_TEAM="$TEAM_ID" \
                     archive
      - name: Export IPA
        script: |
          xcodebuild -exportArchive \
                     -archivePath build/FocusGuard.xcarchive \
                     -exportPath build/ \
                     -exportOptionsPlist ExportOptions.plist
    artifacts:
      - build/*.ipa
    publishing:
      app_store_connect:
        api_key: $APPSTORE_ISSUER_ID
        key_id: $APPSTORE_API_KEY_ID
        issuer_id: $APPSTORE_ISSUER_ID
        submit_to_testflight: true
